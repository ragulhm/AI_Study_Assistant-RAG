<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
  
    
</head>
<body>
      

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">📚 AI Study Assistant</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row vh-100">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 bg-light border-end p-3 sidebar">
            <h6 class="text-muted">Uploaded Books</h6>

            <ul class="list-group mb-4">
                {% for book in books %}
                    <li class="list-group-item small">
                        📘 {{ book }}
                    </li>
                {% empty %}
                    <li class="list-group-item text-muted small">
                        No books uploaded
                    </li>
                {% endfor %}
            </ul>

            <hr>

            <form method="POST" action="/upload/" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <input class="form-control form-control-sm" type="file" name="file" required>
                </div>
                <button class="btn btn-primary btn-sm w-100">
                    Upload Book
                </button>
            </form>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 d-flex flex-column p-4">

            {% block content %}{% endblock %}

        </div>

    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
