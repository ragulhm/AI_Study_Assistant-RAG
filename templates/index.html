{% extends "base.html" %}

{% block content %}

<div class="chat-container flex-grow-1 mb-3">

    {% if question %}
    <div class="chat-bubble user-bubble">
        <strong>You:</strong>
        <p class="mb-0">{{ question }}</p>
    </div>
    {% endif %}

    {% if answer %}
    <div class="chat-bubble bot-bubble">
        <strong>AI:</strong>
        <p class="mb-0">{{ answer }}</p>
    </div>
    {% endif %}

</div>

<form method="POST" action="/" id="askForm">
    {% csrf_token %}
    <div class="input-group">
        <input type="text" name="question" class="form-control" placeholder="Ask something from your book..." required>
        <button class="btn btn-success">
            Ask
        </button>
    </div>
</form>

<div id="loading" class="mt-2 text-primary" style="display:none;">
    <div class="spinner-border spinner-border-sm"></div>
    Generating answer...
</div>

{% endblock %}
